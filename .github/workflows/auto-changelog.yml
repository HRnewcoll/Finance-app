# Auto-Changelog Generator
# Automatically generates/updates CHANGELOG.md when PRs are merged to main/master.
# Uses conventional-changelog based on commit history.

name: Auto-Changelog

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type (patch, minor, major)"
        required: false
        default: "patch"
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install changelog tools
        run: |
          npm install --save-dev \
            conventional-changelog-cli@4.1.0 \
            conventional-changelog-angular@7.0.0

      - name: Generate CHANGELOG.md
        run: |
          npx conventional-changelog \
            --preset angular \
            --infile CHANGELOG.md \
            --same-file \
            --release-count 0
          echo "✅ CHANGELOG.md updated successfully."

      - name: Get latest tag or use initial version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Check if CHANGELOG.md was modified
        id: changes
        run: |
          git diff --quiet CHANGELOG.md && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated CHANGELOG.md
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs(changelog): update CHANGELOG.md [skip ci]"
          git push

      - name: Create GitHub Release (on workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        env:
          RELEASE_TYPE: ${{ github.event.inputs.release_type }}
          LATEST_TAG: ${{ steps.version.outputs.latest_tag }}
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');

            const latestTag = process.env.LATEST_TAG;
            const releaseType = process.env.RELEASE_TYPE;

            // Bump version
            const [major, minor, patch] = latestTag.replace('v', '').split('.').map(Number);
            let newTag;
            if (releaseType === 'major') newTag = `v${major + 1}.0.0`;
            else if (releaseType === 'minor') newTag = `v${major}.${minor + 1}.0`;
            else newTag = `v${major}.${minor}.${patch + 1}`;

            console.log(`Creating release ${newTag} (${releaseType} bump from ${latestTag})`);

            // Extract latest changelog section
            let changelogContent = '';
            try {
              const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
              const sections = changelog.split(/^## /m);
              changelogContent = sections.length > 1 ? `## ${sections[1]}` : changelog.slice(0, 1000);
            } catch (e) {
              changelogContent = `Release ${newTag}`;
            }

            // Create tag and release
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${newTag}`,
              sha: context.sha,
            });

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: newTag,
              name: `Release ${newTag}`,
              body: changelogContent,
              draft: false,
              prerelease: false,
            });

            console.log(`✅ Release ${newTag} created successfully.`);
