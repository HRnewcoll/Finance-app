# Security & Compliance Scanner
# Runs on every pull request to check for security vulnerabilities,
# exposed secrets, and compliance issues.

name: Security & Compliance Scan

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main, master, develop]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # ── Secret Detection ────────────────────────────────────────────────────────
  detect-secrets:
    name: Detect Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: Scan for secrets
        run: |
          detect-secrets scan --baseline .secrets.baseline 2>/dev/null || true
          detect-secrets audit .secrets.baseline --report --json > /tmp/secrets-report.json 2>/dev/null || true

      - name: Check for new secrets
        run: |
          detect-secrets scan --list-all-plugins
          # Fail if detect-secrets finds unaudited secrets
          detect-secrets audit .secrets.baseline --diff 2>&1 | grep -q "No unaudited secrets" && echo "✅ No unaudited secrets found" || {
            echo "❌ Unaudited secrets detected! Run 'detect-secrets audit .secrets.baseline' to review."
            exit 1
          }

  # ── Python Security (Bandit) ────────────────────────────────────────────────
  python-security:
    name: Python Security Scan (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit[toml]==1.7.9

      - name: Run Bandit
        run: |
          if find . -name "*.py" -not -path "./.git/*" | grep -q .; then
            bandit -r . \
              --exclude ./.git,./node_modules,./vendor \
              --format json \
              --output /tmp/bandit-report.json \
              --severity-level medium \
              || true
            bandit -r . \
              --exclude ./.git,./node_modules,./vendor \
              --severity-level high \
              --exit-zero
            echo "::notice::Bandit scan complete. High-severity issues above will fail the build."
            bandit -r . \
              --exclude ./.git,./node_modules,./vendor \
              --severity-level high
          else
            echo "No Python files found, skipping Bandit scan."
          fi

  # ── Dependency Vulnerability Scan (Safety) ─────────────────────────────────
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Safety
        run: pip install safety==3.2.3

      - name: Scan Python dependencies
        run: |
          if [ -f requirements.txt ]; then
            safety check -r requirements.txt --json > /tmp/safety-python.json || {
              echo "⚠️  Vulnerable Python dependencies found:"
              safety check -r requirements.txt
              exit 1
            }
          elif [ -f backend/requirements.txt ]; then
            safety check -r backend/requirements.txt --json > /tmp/safety-python.json || {
              echo "⚠️  Vulnerable Python dependencies found:"
              safety check -r backend/requirements.txt
              exit 1
            }
          else
            echo "No requirements.txt found, skipping Python dependency scan."
          fi

      - name: Scan Node.js dependencies
        if: hashFiles('package-lock.json') != '' || hashFiles('frontend/package-lock.json') != ''
        run: |
          LOCKFILE="package-lock.json"
          [ -f "frontend/package-lock.json" ] && LOCKFILE="frontend/package-lock.json"
          npx --yes better-npm-audit audit --level high --registry https://registry.npmjs.org || {
            echo "⚠️  Vulnerable Node.js dependencies found."
            exit 1
          }

  # ── SAST via Semgrep ────────────────────────────────────────────────────────
  semgrep:
    name: SAST Scan (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep ci \
            --config auto \
            --json \
            --output /tmp/semgrep-report.json \
            --exclude "node_modules,vendor,.git" \
            || true
          # Re-run for human-readable output
          semgrep ci \
            --config auto \
            --exclude "node_modules,vendor,.git"

      - name: Upload Semgrep SARIF
        if: always()
        run: |
          semgrep ci \
            --config auto \
            --sarif \
            --output semgrep.sarif \
            --exclude "node_modules,vendor,.git" \
            || true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif

  # ── License Compliance ──────────────────────────────────────────────────────
  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Python licenses
        run: |
          if find . -name "requirements*.txt" -not -path "./.git/*" | grep -q .; then
            pip install pip-licenses==4.4.0
            find . -name "requirements*.txt" -not -path "./.git/*" | while read req; do
              echo "Checking $req..."
              pip install -r "$req" --quiet 2>/dev/null || true
            done
            pip-licenses --format=json > /tmp/python-licenses.json
            # Fail on GPL-licensed dependencies (adjust as needed for your compliance policy)
            pip-licenses --fail-on="GPL;LGPL" || {
              echo "❌ Forbidden license detected! Review GPL/LGPL dependencies."
              exit 1
            }
          else
            echo "No requirements.txt found, skipping license check."
          fi

      - name: Check Node.js licenses
        if: hashFiles('package.json') != ''
        run: |
          npm install --ignore-scripts --quiet 2>/dev/null || true
          npx --yes license-checker \
            --excludePrivatePackages \
            --failOn "GPL-2.0;GPL-3.0;LGPL-2.0;LGPL-2.1;LGPL-3.0" \
            --json > /tmp/node-licenses.json 2>/dev/null || {
            echo "❌ Forbidden Node.js license detected!"
            npx license-checker --excludePrivatePackages --failOn "GPL-2.0;GPL-3.0"
            exit 1
          }

  # ── Docker Image Scan (if Dockerfile present) ──────────────────────────────
  docker-scan:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    if: hashFiles('**/Dockerfile') != ''
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on Dockerfiles
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ── Summary Report ──────────────────────────────────────────────────────────
  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs:
      [
        detect-secrets,
        python-security,
        dependency-scan,
        semgrep,
        license-check,
      ]
    if: always()
    steps:
      - name: Report Results
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Detection | ${{ needs.detect-secrets.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Security (Bandit) | ${{ needs.python-security.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Vulnerabilities | ${{ needs.dependency-scan.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST (Semgrep) | ${{ needs.semgrep.result == 'success' && '✅ Passed' || needs.semgrep.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License Compliance | ${{ needs.license-check.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Scan performed at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')_" >> $GITHUB_STEP_SUMMARY
